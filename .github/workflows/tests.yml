name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: /root/.cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-
      - run: uv run --frozen pytest
